<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真心話大冒險 - 期中報告系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #f1f5f9;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .btn-action {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-action:active {
            transform: scale(0.95);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            border: 2px solid rgba(255,255,255,.1);
            border-top-color: #ec4899;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- 登入模組 -->
    <div id="login-view" class="glass-card w-full max-w-md p-8 shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-violet-500">
                期中報告採集系統
            </h1>
            <p class="text-slate-400 mt-2 text-sm text-balance">請輸入您的識別碼以同步試算表數據</p>
        </div>
        
        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Member ID</label>
                <input type="text" id="username" 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-4 text-white focus:outline-none focus:ring-2 focus:ring-pink-500/50 transition-all" 
                    placeholder="例如：學號或姓名">
            </div>
            
            <button onclick="handleLogin()" id="login-btn" 
                class="w-full bg-gradient-to-r from-pink-600 to-pink-500 hover:from-pink-500 hover:to-pink-400 text-white font-bold py-4 rounded-xl shadow-lg shadow-pink-500/20 flex justify-center items-center gap-3 btn-action">
                <span>啟動系統</span>
            </button>
        </div>
    </div>

    <!-- 數據操作主介面 -->
    <div id="game-view" class="glass-card w-full max-w-2xl p-6 hidden shadow-2xl">
        <!-- 頂部資訊欄 -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 bg-slate-900/40 p-4 rounded-2xl border border-slate-700/50">
            <div>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-tighter">Current User</p>
                <h2 id="display-user" class="text-xl font-bold text-white">---</h2>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-500 font-bold uppercase tracking-tighter">Total Completed</p>
                <div class="flex items-center gap-2 justify-end">
                    <span id="complete-count" class="text-3xl font-black text-pink-500">0</span>
                    <span class="text-slate-400 text-sm">次</span>
                </div>
            </div>
        </div>

        <!-- 功能抽卡區 -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="drawTask('truth')" class="group p-6 rounded-2xl bg-blue-500/10 border border-blue-500/30 hover:bg-blue-500/20 transition-all text-center btn-action">
                <div class="text-3xl mb-3 group-hover:scale-110 transition-transform">💬</div>
                <div class="font-bold text-blue-400">真心話</div>
            </button>
            <button onclick="drawTask('dare')" class="group p-6 rounded-2xl bg-orange-500/10 border border-orange-500/30 hover:bg-orange-500/20 transition-all text-center btn-action">
                <div class="text-3xl mb-3 group-hover:scale-110 transition-transform">🔥</div>
                <div class="font-bold text-orange-400">大冒險</div>
            </button>
        </div>

        <!-- 任務卡片面板 -->
        <div id="task-panel" class="hidden animate-in fade-in zoom-in duration-300">
            <div class="p-8 rounded-3xl bg-slate-800/80 border-2 border-slate-700 text-center relative overflow-hidden">
                <div id="task-tag" class="inline-block px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-4 bg-slate-700 text-slate-300"></div>
                <h3 id="task-content" class="text-2xl text-white font-bold mb-8 leading-relaxed"></h3>
                
                <div class="flex flex-col sm:flex-row gap-3">
                    <button onclick="confirmCompletion()" id="confirm-btn" 
                        class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-emerald-900/20 btn-action">
                        確認完成任務
                    </button>
                    <button onclick="closeTask()" 
                        class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-200 py-4 rounded-xl transition-all btn-action">
                        放棄本次機會
                    </button>
                </div>
            </div>
        </div>

        <!-- 底部同步狀態顯示 -->
        <div class="mt-8 pt-4 border-t border-slate-800 flex flex-col sm:flex-row justify-between items-center gap-2 text-[11px]">
            <div class="flex items-center gap-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-600"></div>
                <span id="sync-status" class="text-slate-500 italic">系統就緒，等待操作...</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-slate-600">最後同步：<span id="last-sync">--:--:--</span></span>
                <button onclick="logout()" class="text-pink-500/70 hover:text-pink-500 transition-colors font-bold uppercase tracking-widest">Logout</button>
            </div>
        </div>
    </div>

    <script>
        // 你的 Google Apps Script URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxgYyJNXIpc8ScBtmPoIF2MbnbBch1nRgvKWz4Mzyh8GNLGghrnKLRFTlcn2u5D-zPCag/exec";

        const TASKS = {
            truth: [
                "你最後一次說謊是什麼時候？為了什麼？",
                "在場的人中，誰的初次印象跟現在反差最大？",
                "如果可以交換人生一天，你想跟誰換？",
                "你手機裡最不想被別人看到的照片是什麼內容？",
                "你曾經對在座的某個人有過好感嗎？",
                "分享一個你人生中覺得最尷尬的時刻。"
            ],
            dare: [
                "用屁股寫出你的學號後三碼。",
                "給聯絡人清單中第三個人打電話，大喊：我不行了！然後掛斷。",
                "模仿一個現場的人，直到大家猜出來是誰。",
                "現場挑一位異性（或同性）進行 10 秒深情對視。",
                "在不使用手的情況下，吃完一塊餅乾或零食。",
                "發一條社群動態，內容是：『我決定要去追尋我的超人夢了』。"
            ]
        };

        let state = {
            user: "",
            count: 0,
            isSyncing: false
        };

        // 登入處理
        async function handleLogin() {
            const userInput = document.getElementById('username').value.trim();
            if (!userInput) return notify("請輸入識別碼", "error");

            state.user = userInput;
            setLoading(true);

            try {
                // 嘗試從試算表獲取歷史次數
                const response = await fetch(`${SCRIPT_URL}?user=${encodeURIComponent(state.user)}`);
                const data = await response.json();
                state.count = parseInt(data.count) || 0;
            } catch (e) {
                console.error("Fetch error:", e);
                notify("無法連線雲端，將以本地數據開始", "warning");
            }

            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            updateUI();
            setLoading(false);
        }

        function setLoading(loading) {
            const btn = document.getElementById('login-btn');
            btn.disabled = loading;
            btn.innerHTML = loading ? '<div class="spinner"></div> 連線試算表中...' : '<span>啟動系統</span>';
        }

        // 抽題邏輯
        function drawTask(type) {
            const pool = TASKS[type];
            const text = pool[Math.floor(Math.random() * pool.length)];
            
            const panel = document.getElementById('task-panel');
            const content = document.getElementById('task-content');
            const tag = document.getElementById('task-tag');

            tag.innerText = type === 'truth' ? 'Truth / 真心話' : 'Dare / 大冒險';
            tag.className = `inline-block px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-4 ${type === 'truth' ? 'bg-blue-500/20 text-blue-400' : 'bg-orange-500/20 text-orange-400'}`;
            content.innerText = text;
            
            panel.classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function closeTask() {
            document.getElementById('task-panel').classList.add('hidden');
        }

        // 完成並同步 (實作 Exponential Backoff)
        async function confirmCompletion() {
            if (state.isSyncing) return;
            
            state.count++;
            updateUI();
            closeTask();
            
            await syncWithBackoff();
        }

        async function syncWithBackoff() {
            state.isSyncing = true;
            updateSyncStatus("同步中...", "pending");

            const payload = {
                user: state.user,
                count: state.count,
                timestamp: new Date().toISOString()
            };

            let delay = 1000; // 起始延遲 1秒
            const maxRetries = 5;

            for (let i = 0; i < maxRetries; i++) {
                try {
                    // 使用 POST 發送到 Google Apps Script
                    // 注意：Google Apps Script 的 POST 跨網域通常需要使用 no-cors
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    // no-cors 模式下無法讀取 response，但如果沒拋出 catch 就算初步成功
                    updateSyncStatus("雲端同步成功", "success");
                    state.isSyncing = false;
                    return;
                } catch (err) {
                    if (i === maxRetries - 1) {
                        updateSyncStatus("同步失敗，請檢查網路", "error");
                    } else {
                        updateSyncStatus(`重試中 (${i+1})...`, "pending");
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2; // 指數增加
                    }
                }
            }
            state.isSyncing = false;
        }

        // UI 更新工具
        function updateUI() {
            document.getElementById('display-user').innerText = state.user;
            document.getElementById('complete-count').innerText = state.count;
        }

        function updateSyncStatus(msg, type) {
            const statusText = document.getElementById('sync-status');
            const dot = document.getElementById('status-dot');
            statusText.innerText = msg;
            
            if (type === 'success') {
                dot.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]";
                document.getElementById('last-sync').innerText = new Date().toLocaleTimeString();
            } else if (type === 'error') {
                dot.className = "w-2 h-2 rounded-full bg-pink-500 shadow-[0_0_8px_rgba(236,72,153,0.5)]";
            } else {
                dot.className = "w-2 h-2 rounded-full bg-amber-500 animate-pulse";
            }
        }

        function notify(msg, type) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white text-sm font-bold shadow-2xl z-[100] transition-all duration-500 transform translate-y-20 opacity-0 ${type === 'error' ? 'bg-pink-600' : 'bg-slate-700'}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('translate-y-20', 'opacity-0');
            }, 100);

            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function logout() {
            if(confirm("確定要切換帳號嗎？")) location.reload();
        }
    </script>
</body>
</html>
